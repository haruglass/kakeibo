<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>家計簿</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="icon.png">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">
  <style>
    :root { --bg: #222222; --card: #333333; --text: #ffffff; --border: #555555; --sub: #999999; }
    body { background-color: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; height: 100vh; margin: 0; overflow: hidden; }
    .container { max-width: 500px; margin: auto; height: 100vh; display: flex; flex-direction: column; position: relative; }
    .tab-content { flex: 1; overflow-y: auto; padding: 12px; padding-bottom: 85px; }
    .display-none { display: none !important; }
    
    /* フォーム設定 */
    .field { margin-bottom: 0.6rem !important; }
    .input, .select select { font-size: 1.1rem !important; background-color: var(--card) !important; color: #fff !important; border: 1px solid var(--border) !important; height: 2.6em; }
    .label { color: var(--sub) !important; font-size: 0.9rem !important; margin-bottom: 0.2rem !important; font-weight: normal; }
    
    /* 統計・履歴の文字色修正 */
    .stat-card { border-bottom: 1px solid var(--border); padding: 20px 0; }
    .main-expense { font-size: 2.3rem; font-weight: bold; color: #ffffff !important; }
    .detail-item strong { color: #ffffff !important; }
    .history-amount { font-size: 1.2rem; font-weight: bold; color: #ffffff !important; }
    .history-item { border-bottom: 1px solid var(--border); padding: 12px 0; position: relative; }
    
    /* ナビゲーション */
    .navbar-bottom { position: absolute; bottom: 0; width: 100%; background: #1a1a1a; border-top: 1px solid var(--border); display: flex; height: 75px; z-index: 500; }
    .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 0.9rem; color: #666; cursor: pointer; }
    .nav-item.is-active { color: #fff; font-weight: bold; border-top: 3px solid #fff; }
    
    .btn-submit { background: #eeeeee !important; color: #000 !important; font-weight: bold; width: 100%; padding: 14px; border-radius: 6px; font-size: 1.3rem; margin-top: 10px; }
    #loading { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.7); display:none; justify-content:center; align-items:center; z-index:2000; color: white; }
    .delete-btn { position: absolute; right: 0; top: 12px; color: #ff6666; font-size: 0.8rem; border: 1px solid #ff6666; padding: 2px 8px; border-radius: 4px; }
  </style>
</head>
<body>
  <div id="loading">通信中...</div>
  <div class="container">
    <div id="page-input" class="tab-content">
      <form id="kakeiboForm">
        <div class="columns is-mobile is-gapless mb-0">
          <div class="column mr-1"><div class="field"><label class="label">日付</label><input class="input" type="date" id="date" required></div></div>
          <div class="column"><div class="field"><label class="label">区分</label><div class="select is-fullwidth"><select id="type" onchange="updateForm()"><option value="支出">支出</option><option value="収入">収入</option><option value="振替">振替</option></select></div></div></div>
        </div>
        <div class="field"><label class="label">金額</label><input class="input" type="text" id="amount" placeholder="0" onchange="calculateAmount(this)"></div>
        <div id="standard-account" class="field"><label class="label">資産</label><div class="select is-fullwidth"><select id="account"><option>現金</option><option>ゆうちょ</option><option>給料</option><option>PayPay</option><option>バンドル</option><option>メルペイ</option></select></div></div>
        <div id="transfer-accounts" class="display-none">
          <div class="field"><label class="label">振替元</label><div class="select is-fullwidth"><select id="accountFrom"><option>現金</option><option>ゆうちょ</option><option>給料</option><option>PayPay</option><option>バンドル</option><option>メルペイ</option></select></div></div>
          <div class="field"><label class="label">振替先</label><div class="select is-fullwidth"><select id="accountTo"><option>現金</option><option>ゆうちょ</option><option>給料</option><option>PayPay</option><option>バンドル</option><option>メルペイ</option></select></div></div>
        </div>
        <div id="category-field" class="field"><label class="label">カテゴリー</label><div class="select is-fullwidth"><select id="category"></select></div></div>
        <div class="field"><label class="label">メモ</label><input class="input" type="text" id="memo"></div>
        <button type="submit" class="btn-submit">記録する</button>
      </form>
    </div>

    <div id="page-history" class="tab-content display-none"><div id="history-list"></div></div>
    <div id="page-balance" class="tab-content display-none"><div id="balance-list"></div></div>
    <div id="page-stats" class="tab-content display-none"><div id="stats-list"></div></div>

    <nav class="navbar-bottom">
      <div class="nav-item is-active" id="nav-input" onclick="switchTab('input')"><span>記録</span></div>
      <div class="nav-item" id="nav-history" onclick="switchTab('history')"><span>履歴</span></div>
      <div class="nav-item" id="nav-balance" onclick="switchTab('balance')"><span>資産</span></div>
      <div class="nav-item" id="nav-stats" onclick="switchTab('stats')"><span>統計</span></div>
    </nav>
  </div>

  <script>
    // --- ここを自分のURLに書き換える ---
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwidKnpabBiYCSgH8GQ7X0VsFb4R_3jedpJUIEiencZoJxiT-cFrVAc3NHK74N_T3As6Q/exec";
    // ------------------------------

    const categories = { "支出": ["食費", "趣味", "服 美容", "生活費", "交際費", "医療", "その他", "調整"], "収入": ["年金", "給料", "お小遣い", "利子", "その他"] };

    function calculateAmount(input) {
      try {
        const val = input.value.replace(/[^-+*/0-9.]/g, '');
        if (val && /[+\-*/]/.test(val)) input.value = Function('"use strict";return (' + val + ')')();
      } catch (e) { }
    }

    function updateForm() {
      const type = document.getElementById('type').value;
      document.getElementById('transfer-accounts').classList.toggle('display-none', type !== '振替');
      document.getElementById('standard-account').classList.toggle('display-none', type === '振替');
      document.getElementById('category-field').classList.toggle('display-none', type === '振替');
      const catSelect = document.getElementById('category');
      catSelect.innerHTML = '';
      if (categories[type]) categories[type].forEach(c => catSelect.add(new Option(c, c)));
    }

    // タブ切り替えの修正：表示の切り替えを先に行う
    function switchTab(tab) {
      document.querySelectorAll('.tab-content').forEach(el => el.classList.add('display-none'));
      document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('is-active'));
      document.getElementById('page-' + tab).classList.remove('display-none');
      document.getElementById('nav-' + tab).classList.add('is-active');
      
      if(tab !== 'input') {
        loadData();
      }
    }

    async function loadData() {
      if (!GAS_URL.startsWith("http")) {
        console.warn("GAS_URLが設定されていません。");
        return;
      }
      document.getElementById('loading').style.display = 'flex';
      try {
        const response = await fetch(GAS_URL);
        const data = await response.json();
        
        // 履歴の描画
        document.getElementById('history-list').innerHTML = data.history.map(item => `
          <div class="history-item">
            <div class="is-flex is-justify-content-space-between">
              <span style="color:var(--sub); font-size:0.85rem;">${item.date} · ${item.account}</span>
              <strong class="history-amount">¥${Number(item.amount).toLocaleString()}</strong>
            </div>
            <div style="font-size:0.85rem; color:var(--sub)">${item.category} ${item.memo ? '· '+item.memo : ''}</div>
          </div>`).join('');

        // 統計の描画（簡易版）
        document.getElementById('stats-list').innerHTML = data.statsBody.map(row => `
          <div class="stat-card">
            <div style="color:var(--sub)">${row[0]}</div>
            <div class="main-expense">¥${row[1].toLocaleString()}</div>
            <div style="color:var(--sub); font-size:0.9rem;">収入: ¥${row[11].toLocaleString()} / 収支: ¥${row[17].toLocaleString()}</div>
          </div>`).join('');

        // 資産の描画
        document.getElementById('balance-list').innerHTML = data.balances.map(row => `
          <div class="is-flex is-justify-content-space-between py-4" style="border-bottom:1px solid var(--border); font-size:1.2rem">
            <span>${row[0]}</span><strong style="color:#fff">¥${Number(row[1]||0).toLocaleString()}</strong>
          </div>`).join('');
          
      } catch (e) {
        console.error("データ取得エラー:", e);
      } finally {
        document.getElementById('loading').style.display = 'none';
      }
    }

    document.getElementById('kakeiboForm').onsubmit = async function(e) {
      e.preventDefault();
      if (!GAS_URL.startsWith("http")) { alert("GASのURLを設定してください"); return; }
      
      document.getElementById('loading').style.display = 'flex';
      const payload = {
        method: 'add',
        date: document.getElementById('date').value,
        type: document.getElementById('type').value,
        amount: document.getElementById('amount').value,
        account: document.getElementById('account').value,
        accountFrom: document.getElementById('accountFrom').value,
        accountTo: document.getElementById('accountTo').value,
        category: document.getElementById('category').value,
        memo: document.getElementById('memo').value
      };
      
      try {
        await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) });
        this.reset();
        document.getElementById('date').value = new Date().toISOString().substring(0, 10);
        updateForm();
        alert("記録しました");
      } catch (e) {
        alert("送信に失敗しました");
      } finally {
        document.getElementById('loading').style.display = 'none';
      }
    };

    window.onload = () => {
      document.getElementById('date').value = new Date().toISOString().substring(0, 10);
      updateForm();
    };
  </script>
</body>
</html>
